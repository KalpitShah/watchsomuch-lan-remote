<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Fit the phone screen and disable pinch-zoom so it feels like a native app. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0B0C11" />
  <title>WatchSoMuch Remote</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="remote">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="14" rx="3"></rect>
            <path d="M8 21h8M12 18v3"></path>
          </svg>
        </span>
        <span class="brand-text">WatchSoMuch <strong>Remote</strong></span>
      </div>
    </header>

    <!-- The big, most-important control: Play / Pause. -->
    <button class="play" data-action="playpause" aria-label="Play or Pause">
      <span class="play-glow" aria-hidden="true"></span>
      <span class="play-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="58" height="58" fill="currentColor">
          <path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5z"></path>
        </svg>
      </span>
      <span class="play-label">Play / Pause</span>
    </button>

    <!-- Seek backward / forward. -->
    <div class="row two">
      <button class="tile" data-action="seek-back" aria-label="Rewind 10 seconds">
        <svg class="tile-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 19 4 12l7-7"></path><path d="M20 19l-7-7 7-7"></path>
        </svg>
        <span class="tile-num">10s</span>
        <span class="tile-sub">Rewind</span>
      </button>
      <button class="tile" data-action="seek-forward" aria-label="Forward 10 seconds">
        <svg class="tile-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13 5l7 7-7 7"></path><path d="M4 5l7 7-7 7"></path>
        </svg>
        <span class="tile-num">10s</span>
        <span class="tile-sub">Forward</span>
      </button>
    </div>

    <!-- Playback speed: a segmented control. -->
    <section class="block">
      <span class="block-label">Speed</span>
      <div class="segment" role="group" aria-label="Playback speed">
        <button class="seg is-active" data-action="speed-1" data-group="speed">1×</button>
        <button class="seg" data-action="speed-1.25" data-group="speed">1.25×</button>
        <button class="seg" data-action="speed-1.5" data-group="speed">1.5×</button>
        <button class="seg" data-action="speed-2" data-group="speed">2×</button>
      </div>
    </section>

    <!-- Captions toggle. -->
    <button class="bar bar-toggle" data-action="captions" id="ccBtn" aria-pressed="false">
      <span class="bar-left">
        <span class="cc-badge">CC</span>
        <span class="bar-text">Captions</span>
      </span>
      <span class="switch" aria-hidden="true"><span class="switch-knob"></span></span>
    </button>

    <!-- Next episode. -->
    <button class="bar bar-accent" data-action="next" aria-label="Next episode">
      <span class="bar-text">Next Episode</span>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
        <path d="M6 5.5v13a1 1 0 0 0 1.5.87L16 14.5V18a1 1 0 0 0 2 0V6a1 1 0 0 0-2 0v3.5L7.5 4.63A1 1 0 0 0 6 5.5z"></path>
      </svg>
    </button>

    <!-- Fullscreen toggle. -->
    <button class="bar bar-ghost" data-action="fullscreen" aria-label="Toggle fullscreen">
      <span class="bar-text">Fullscreen</span>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"></path>
      </svg>
    </button>

    <!-- Bottom status indicator: shows whether the last command was delivered. -->
    <div class="status" id="status" role="status" aria-live="polite">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Ready</span>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
